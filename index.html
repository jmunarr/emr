<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream EMR | Informatics Innovators</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
    @keyframes ecg-sweep {
        0% { clip-path: inset(0 100% 0 0); }
        100% { clip-path: inset(0 0 0 0); }
    }
    </style>
</head>
<body class="bg-[#0a192f] h-screen overflow-hidden font-sans">

    <div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#0a192f]">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Nurse Login</h2>
            <input type="text" id="username" placeholder="Username" class="w-full p-3 mb-4 border rounded-lg outline-none focus:border-teal-500 text-slate-700">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 mb-6 border rounded-lg outline-none focus:border-teal-500 text-slate-700">
            <button onclick="handleLogin()" class="w-full bg-[#0a192f] text-white py-3 rounded-lg font-bold hover:bg-slate-800 transition-colors shadow-md">Login</button>
            <p id="login-error" class="text-red-500 mt-4 text-sm hidden">Invalid credentials</p>
        </div>
    </div>

    <div id="patient-picker" class="fixed inset-0 z-50 p-8 flex flex-col items-center overflow-y-auto bg-[#0a192f]">
        <div class="mt-12 flex flex-col items-center">
            <h1 class="text-4xl font-bold text-white mb-2">Dream EMR</h1>
            <p class="text-slate-400 mb-8">Nursing student workspace | Select patient to begin</p>
        </div>
        
        <div class="w-full max-w-6xl flex justify-end mb-6">
            <button onclick="openAddPatientModal()" class="bg-teal-600 text-white px-5 py-2.5 rounded-lg font-bold hover:bg-teal-700 transition shadow-lg flex items-center gap-2">
                <i data-lucide="user-plus" class="w-5 h-5"></i> Admit New Patient
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 w-full max-w-6xl pb-24" id="patient-grid">
            <button onclick="pickPatient('Bongar, Carl Zendrick')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Bongar, Carl Zendrick</button>
            <button onclick="pickPatient('Damino, Patrick')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Damino, Patrick</button>
            <button onclick="pickPatient('Fernandez, John Davey')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Fernandez, John Davey</button>
            <button onclick="pickPatient('Lagdameo, Sofronio')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Lagdameo, Sofronio</button>
            <button onclick="pickPatient('Mangi, Shandy')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Mangi, Shandy</button>
            <button onclick="pickPatient('Soriano, Francis')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Soriano, Francis</button>
            <button onclick="pickPatient('Badion, Shin')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Badion, Shin</button>
            <button onclick="pickPatient('Barredo, Juliana Gayle')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Barredo, Juliana Gayle</button>
            <button onclick="pickPatient('Bunoy, Caira Mizrel')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Bunoy, Caira Mizrel</button>
            <button onclick="pickPatient('Casem, Azzhia')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Casem, Azzhia</button>
            <button onclick="pickPatient('Cruz, Irizh')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Cruz, Irizh</button>
            <button onclick="pickPatient('Mendez, Althea')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Mendez, Althea</button>
            <button onclick="pickPatient('Munar, Justine Kieth')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center">Munar, Justine Kieth</button>
            <button onclick="pickPatient('Sample, Normal')" class="bg-white text-slate-800 py-6 px-4 rounded-xl font-semibold shadow-md hover:bg-slate-100 hover:-translate-y-1 hover:shadow-xl transition-all duration-200 w-full text-center border-2 border-teal-500">Sample, Normal (Baseline)</button>
        </div>
        
        <div class="fixed bottom-0 left-0 right-0 bg-[#0a192f] border-t border-slate-700 p-4 flex justify-center z-50">
            <button onclick="logout()" class="flex items-center gap-2 p-2 text-red-400 hover:text-red-300 font-bold transition-colors">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </div>
    </div>

    <div id="add-patient-modal" class="fixed inset-0 z-[150] hidden items-center justify-center bg-[#0a192f] bg-opacity-80 backdrop-blur-sm p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white px-8 py-5 border-b border-slate-200 flex justify-between items-center z-10">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="clipboard-plus" class="w-6 h-6 text-teal-600"></i> Admit New Patient
                </h2>
                <button onclick="closeAddPatientModal()" class="text-slate-400 hover:text-red-500 transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            
            <div class="p-8 space-y-6">
                <div>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3 border-b pb-1">Demographics</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Full Name *</label>
                            <input type="text" id="np-name" placeholder="Last, First" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Date of Birth</label>
                            <input type="text" id="np-dob" placeholder="e.g. Jan 1, 1990" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Age / Sex</label>
                            <input type="text" id="np-agesex" placeholder="e.g. 30 / Male" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Weight</label>
                            <input type="text" id="np-weight" placeholder="e.g. 70 kg" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Room Assignment</label>
                            <input type="text" id="np-room" placeholder="e.g. 101-A" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Primary Language</label>
                            <input type="text" id="np-lang" placeholder="e.g. English" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Attending Physician</label>
                            <input type="text" id="np-physician" placeholder="Dr. Name" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3 border-b pb-1">Clinical Information</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Chief Complaint</label>
                            <input type="text" id="np-complaint" placeholder="Reason for admission" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Allergy</label>
                            <input type="text" id="np-allergy" placeholder="NKA or Allergen" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Allergy Reaction Note</label>
                            <input type="text" id="np-allergyNote" placeholder="e.g. Hives" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wide mb-1">Acuity Level (1-4)</label>
                            <select id="np-acuity" class="w-full border border-slate-300 p-2.5 rounded-lg text-sm focus:border-teal-500 outline-none">
                                <option value="1">1 - Low</option>
                                <option value="2">2 - Medium-Low</option>
                                <option value="3">3 - Moderate</option>
                                <option value="4">4 - High</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3 border-b pb-1">Initial Vitals</h3>
                    <div class="grid grid-cols-5 gap-3">
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">BP</label><input type="text" id="np-bp" placeholder="120/80" class="w-full border p-2 rounded-lg text-sm"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">HR</label><input type="number" id="np-hr" placeholder="70" class="w-full border p-2 rounded-lg text-sm"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">RR</label><input type="number" id="np-rr" placeholder="16" class="w-full border p-2 rounded-lg text-sm"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">TEMP</label><input type="number" step="0.1" id="np-temp" placeholder="36.6" class="w-full border p-2 rounded-lg text-sm"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1">O2%</label><input type="number" id="np-o2" placeholder="99" class="w-full border p-2 rounded-lg text-sm"></div>
                    </div>
                </div>
            </div>

            <div class="sticky bottom-0 bg-slate-50 px-8 py-5 border-t border-slate-200 flex justify-end gap-3 rounded-b-2xl">
                <button onclick="closeAddPatientModal()" class="px-5 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg font-bold hover:bg-slate-50 transition-colors">Cancel</button>
                <button onclick="saveNewPatient()" class="px-5 py-2.5 bg-[#0a192f] text-white rounded-lg font-bold hover:bg-slate-800 transition-colors shadow-md">Admit Patient</button>
            </div>
        </div>
    </div>

    <div id="main-ui" class="hidden flex h-screen text-slate-900 bg-slate-50">
        <aside id="sidebar" class="w-64 bg-[#0a192f] p-6 text-white flex flex-col transition-all duration-300 ease-in-out overflow-hidden whitespace-nowrap">
            <button onclick="goBack()" class="flex items-center gap-2 text-slate-400 hover:text-white mb-8 transition-colors"><i data-lucide="chevron-left"></i> Back to Census</button>
            <h2 id="active-patient" class="text-xl font-bold mb-8 text-blue-400 truncate"></h2>
            
            <nav class="flex flex-col gap-2">
                <button onclick="showSection('dashboard')" class="flex items-center gap-4 p-2 rounded hover:bg-slate-800"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</button>
                <button onclick="showSection('flowsheets')" class="flex items-center gap-4 p-2 rounded hover:bg-slate-800"><i data-lucide="activity" class="w-4 h-4"></i> Flowsheets</button>
                <button onclick="showSection('mar')" class="flex items-center gap-4 p-2 rounded hover:bg-slate-800"><i data-lucide="pill" class="w-4 h-4"></i> MAR</button>
                <button onclick="showSection('careplan')" class="flex items-center gap-4 p-2 rounded hover:bg-slate-800"><i data-lucide="clipboard-list" class="w-4 h-4"></i> Care Plan</button>
                <button onclick="showSection('burnout')" class="flex items-center gap-4 p-2 rounded hover:bg-slate-800"><i data-lucide="shield-check" class="w-4 h-4"></i> BurnoutGuard</button>

                <div class="mt-auto border-t border-slate-700 pt-4">
                    <button onclick="logout()" class="flex items-center gap-4 p-2 w-full text-red-400 hover:text-red-300 transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Logout
                    </button>
                </div>
            </nav>
        </aside>
        
        <main class="flex-1 p-8 overflow-y-auto relative">
            
            <div class="absolute top-8 right-8 bg-white border border-slate-200 px-4 py-2 rounded-lg shadow-sm flex flex-col items-end">
                <div class="flex items-center gap-2 text-sm font-bold text-slate-800">
                    <span class="w-2 h-2 rounded-full bg-green-500"></span> Student Nurse View
                </div>
                <div class="text-xs text-slate-500" id="current-time-display">Jul 04, 08:01 PM</div>
            </div>

            <div class="max-w-7xl mx-auto mb-6 pr-48 flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 bg-white rounded-lg border border-slate-200 shadow-sm text-slate-500 hover:text-teal-600 transition-colors focus:outline-none">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
                <h1 id="patient-name-display" class="text-3xl font-bold text-slate-800"></h1>
            </div>

            <div id="section-content"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
